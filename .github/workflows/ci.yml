name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JARVIS_OFFLINE_TESTS: "1"
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install --prefer-binary -r requirements.txt
          else
            pip install -e .
          fi
          pip install pytest coverage ruff

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Tests (offline, live tests skipped)
        run: |
          python -m pytest -q --disable-warnings --maxfail=10 -p no:cacheprovider \
            --ignore=tests/test_gremlins.py \
            --ignore=tests/test_model_bartowski.py \
            --ignore=tests/test_integration_ollama.py